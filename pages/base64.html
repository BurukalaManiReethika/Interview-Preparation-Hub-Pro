
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder Decoder | Developer OS</title>

<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="tool-container">

<a href="../index.html" class="back-btn">
⬅ Back
</a>

<h2>🔐 Base64 Encoder / Decoder</h2>

<textarea
id="inputText"
rows="8"
placeholder="Enter text or Base64 string..."
></textarea>

<button onclick="encodeText()">
🔒 Encode
</button>

<button onclick="decodeText()">
🔓 Decode
</button>

<button onclick="copyResult()">
📋 Copy Result
</button>

<textarea
id="outputText"
rows="8"
placeholder="Result appears here..."
readonly
></textarea>

<div
id="status"
class="result"
>
Ready...
</div>

</div>

<script>

function encodeText(){

const input =
document.getElementById(
"inputText"
).value;

try{

const encoded =
btoa(input);

document.getElementById(
"outputText"
).value =
encoded;

document.getElementById(
"status"
).innerHTML =
"✅ Encoded Successfully";

}
catch(error){

document.getElementById(
"status"
).innerHTML =
"❌ Encoding Failed";

}

}

function decodeText(){

const input =
document.getElementById(
"inputText"
).value;

try{

const decoded =
atob(input);

document.getElementById(
"outputText"
).value =
decoded;

document.getElementById(
"status"
).innerHTML =
"✅ Decoded Successfully";

}
catch(error){

document.getElementById(
"status"
).innerHTML =
"❌ Invalid Base64 String";

}

}

function copyResult(){

const output =
document.getElementById(
"outputText"
);

if(output.value === ""){

alert("Nothing to copy");

return;

}

navigator.clipboard.writeText(
output.value
);

alert("Copied Successfully!");

}
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0f14; --surface: #161a23; --border: #252a36;
  --accent: #6c63ff; --accent2: #00d9a6;
  --text: #e2e8f0; --muted: #7a8498; --card-bg: #1a1f2e;
  --danger: #ff5e7a; --success: #00d9a6;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }

.page-header {
  display: flex; align-items: center; gap: 14px;
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.back-btn {
  display: flex; align-items: center; gap: 6px;
  color: var(--muted); font-size: 0.82rem; font-weight: 500;
  padding: 6px 12px; border: 1px solid var(--border);
  border-radius: 7px; transition: color 0.15s, border-color 0.15s;
  text-decoration: none;
}
.back-btn:hover { color: var(--text); border-color: var(--accent); }
.page-title { font-size: 1rem; font-weight: 600; }

.container { max-width: 860px; margin: 0 auto; padding: 32px 20px 60px; }

label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
textarea, input[type=text], input[type=number], select {
  width: 100%; padding: 11px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
  outline: none; resize: vertical; transition: border-color 0.18s;
}
textarea:focus, input:focus, select:focus { border-color: var(--accent); }
textarea { line-height: 1.6; min-height: 140px; }

.row { display: flex; gap: 12px; flex-wrap: wrap; }
.col { flex: 1; min-width: 200px; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 18px; border-radius: 8px; border: none;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  transition: opacity 0.15s, transform 0.15s; font-family: 'Inter', sans-serif;
}
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-success { background: var(--success); color: #0d0f14; }
.btn-danger { background: var(--danger); color: #fff; }

.output-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; margin-top: 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
  line-height: 1.7; white-space: pre-wrap; word-break: break-all;
  min-height: 60px;
}
.output-box.success-border { border-color: var(--success); }
.output-box.error-border { border-color: var(--danger); }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.badge-purple { background: rgba(108,99,255,0.18); color: var(--accent); }
.badge-green  { background: rgba(0,217,166,0.15); color: var(--accent2); }
.badge-red    { background: rgba(255,94,122,0.15); color: var(--danger); }

.divider { height: 1px; background: var(--border); margin: 24px 0; }
.mt { margin-top: 16px; }
.mb { margin-bottom: 16px; }
.flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--accent2); color: #0d0f14;
  padding: 10px 18px; border-radius: 8px;
  font-size: 0.82rem; font-weight: 600;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; }

</script>

</body>
</html>
