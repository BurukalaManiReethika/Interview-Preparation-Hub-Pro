
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette | Developer OS</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

  <div id="toast" class="toast">✓ Copied!</div>

  <div class="tool-page">
    <a href="../index.html" class="back-btn">← Back to tools</a>
    <div class="tool-title">🎨 Color Palette Generator</div>

    <div id="color-swatch" class="color-swatch">
      <span id="color-hex-display" class="color-hex-display">#6C63FF</span>
    </div>

    <div class="color-variants" id="color-variants"></div>

    <div class="color-inputs">
      <div>
        <label>Pick a color</label>
        <input type="color" id="color-picker" value="#6c63ff" oninput="setColorFromPicker()">
      </div>
      <div>
        <label>HEX value</label>
        <input type="text" id="color-hex-input" value="#6c63ff" placeholder="#rrggbb" oninput="setColorFromHex()">
      </div>
    </div>

    <div class="row mt-8">
      <button class="btn btn-primary"   onclick="randomColor()">🎲 Random Color</button>
      <button class="btn btn-secondary" onclick="copyColorHex()">📋 Copy HEX</button>
    </div>

    <div class="card-box mt-16">
      <label>Color formats</label>
      <div id="color-formats" class="color-formats"></div>
    </div>
  </div>

<script>
let currentColor = '#6c63ff';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b ? 6:0)) / 6; break;
      case g: h = ((b-r)/d + 2) / 6; break;
      case b: h = ((r-g)/d + 4) / 6; break;
    }
  }
  return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
}

function shadeHex(hex, pct) {
  const {r,g,b} = hexToRgb(hex);
  const f = 1 + pct/100;
  const clamp = v => Math.min(255, Math.max(0, Math.round(v*f)));
  return '#' + [clamp(r), clamp(g), clamp(b)].map(x => x.toString(16).padStart(2,'0')).join('');
}

function updateColor(hex) {
  currentColor = hex;
  document.getElementById('color-swatch').style.background = hex;
  document.getElementById('color-hex-display').textContent = hex.toUpperCase();
  document.getElementById('color-picker').value   = hex;
  document.getElementById('color-hex-input').value = hex;
  renderVariants(hex);
  renderFormats(hex);
}

function renderVariants(hex) {
  const shades = [-40, -20, 0, 20, 40];
  const labels = ['Dark','Mid-D','Base','Mid-L','Light'];
  document.getElementById('color-variants').innerHTML = shades.map((p, i) => {
    const c = shadeHex(hex, p);
    return `<div class="variant-box" style="background:${c}" title="${c}" onclick="updateColor('${c}')">
              <span>${labels[i]}</span>
            </div>`;
  }).join('');
}

function renderFormats(hex) {
  const {r,g,b} = hexToRgb(hex);
  const {h,s,l} = rgbToHsl(r,g,b);
  document.getElementById('color-formats').innerHTML = `
    <div>HEX &nbsp;<strong style="color:var(--text)">${hex.toUpperCase()}</strong></div>
    <div>RGB &nbsp;<strong style="color:var(--text)">rgb(${r}, ${g}, ${b})</strong></div>
    <div>HSL &nbsp;<strong style="color:var(--text)">hsl(${h}, ${s}%, ${l}%)</strong></div>`;
}

function randomColor() {
  const hex = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
  updateColor(hex);
}

function setColorFromPicker() { updateColor(document.getElementById('color-picker').value); }

function setColorFromHex() {
  const val = document.getElementById('color-hex-input').value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(val)) updateColor(val);
}

function copyColorHex() {
  navigator.clipboard.writeText(currentColor.toUpperCase())
    .then(() => showToast('✓ HEX copied!'));
}

// init
updateColor('#6c63ff');
</script>
</body>
</html>
