
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator | Developer OS</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

  <div id="toast" class="toast">✓ Copied!</div>

  <div class="tool-page">
    <a href="../index.html" class="back-btn">← Back to tools</a>
    <div class="tool-title">🔐 Password Generator</div>

    <div class="card-box">
      <div class="pw-output" id="pw-output">Click Generate to create a password</div>
      <div class="strength-bar"><div id="pw-strength-fill"></div></div>
      <div class="row-between mb-12">
        <span id="pw-strength-label" style="font-size:0.8rem;color:var(--muted)">Strength: —</span>
        <span style="font-size:0.8rem;color:var(--muted)">Length: <span id="pw-len-display">16</span></span>
      </div>
      <input type="range" id="pw-len" min="6" max="64" value="16" oninput="updateLen()">
      <div class="checkboxes">
        <label><input type="checkbox" id="pw-upper" checked> Uppercase (A–Z)</label>
        <label><input type="checkbox" id="pw-lower" checked> Lowercase (a–z)</label>
        <label><input type="checkbox" id="pw-num"   checked> Numbers (0–9)</label>
        <label><input type="checkbox" id="pw-sym"   checked> Symbols (!@#$)</label>
      </div>
      <div class="row mt-8">
        <button class="btn btn-primary" onclick="generatePassword()">⚡ Generate</button>
        <button class="btn btn-secondary" onclick="copyPassword()">📋 Copy</button>
      </div>
    </div>
  </div>

<script>
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg || '✓ Copied!';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function updateLen() {
  document.getElementById('pw-len-display').textContent =
    document.getElementById('pw-len').value;
}

function generatePassword() {
  const len   = +document.getElementById('pw-len').value;
  const upper = document.getElementById('pw-upper').checked;
  const lower = document.getElementById('pw-lower').checked;
  const num   = document.getElementById('pw-num').checked;
  const sym   = document.getElementById('pw-sym').checked;

  let chars = '';
  if (upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (lower) chars += 'abcdefghijklmnopqrstuvwxyz';
  if (num)   chars += '0123456789';
  if (sym)   chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

  if (!chars) { showToast('⚠ Select at least one option!'); return; }

  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  const pw = Array.from(arr).map(v => chars[v % chars.length]).join('');

  document.getElementById('pw-output').textContent = pw;
  updateStrength(pw, { upper, lower, num, sym });
}

function updateStrength(pw, opts) {
  let score = 0;
  if (pw.length >= 12) score++;
  if (pw.length >= 20) score++;
  if (opts.upper && opts.lower) score++;
  if (opts.num)  score++;
  if (opts.sym)  score++;

  const levels = [
    { label: 'Very Weak', color: '#f87171', pct: '15%'  },
    { label: 'Weak',      color: '#fb923c', pct: '35%'  },
    { label: 'Fair',      color: '#fbbf24', pct: '55%'  },
    { label: 'Good',      color: '#34d399', pct: '75%'  },
    { label: 'Strong',    color: '#6c63ff', pct: '100%' },
  ];
  const lvl = levels[Math.min(score, levels.length - 1)];

  const fill  = document.getElementById('pw-strength-fill');
  const label = document.getElementById('pw-strength-label');
  fill.style.width      = lvl.pct;
  fill.style.background = lvl.color;
  label.textContent     = 'Strength: ' + lvl.label;
  label.style.color     = lvl.color;
}

function copyPassword() {
  const pw = document.getElementById('pw-output').textContent;
  if (pw && pw !== 'Click Generate to create a password') {
    navigator.clipboard.writeText(pw).then(() => showToast('✓ Password copied!'));
  }
}

// auto-generate on load
generatePassword();
</script>
</body>
</html>
