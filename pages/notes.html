
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App | Developer OS</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

  <div id="toast" class="toast">✓ Saved!</div>

  <div class="tool-page">
    <a href="../index.html" class="back-btn">← Back to tools</a>
    <div class="tool-title">📝 Notes App</div>

    <div class="card-box">
      <label>New Note</label>
      <textarea id="notes-input" placeholder="Type your note here…" style="min-height:90px"></textarea>
      <div class="row mt-12">
        <button class="btn btn-primary"   onclick="saveNote()">💾 Save Note</button>
        <button class="btn btn-secondary" onclick="clearAllNotes()">🗑 Clear All</button>
      </div>
    </div>

    <div id="notes-list" class="notes-list"></div>
  </div>

<script>
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function getNotes() {
  try { return JSON.parse(localStorage.getItem('devos-notes') || '[]'); }
  catch (e) { return []; }
}
function setNotes(notes) {
  localStorage.setItem('devos-notes', JSON.stringify(notes));
}

function saveNote() {
  const val = document.getElementById('notes-input').value.trim();
  if (!val) return;
  const notes = getNotes();
  notes.unshift({ id: Date.now(), text: val, date: new Date().toLocaleString() });
  setNotes(notes);
  document.getElementById('notes-input').value = '';
  renderNotes();
  showToast('✓ Note saved!');
}

function deleteNote(id) {
  setNotes(getNotes().filter(n => n.id !== id));
  renderNotes();
}

function clearAllNotes() {
  if (!getNotes().length) return;
  setNotes([]);
  renderNotes();
  showToast('✓ All notes cleared');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderNotes() {
  const list  = document.getElementById('notes-list');
  const notes = getNotes();
  if (!notes.length) {
    list.innerHTML = '<div class="notes-empty">No notes yet. Write one above!</div>';
    return;
  }
  list.innerHTML = notes.map(n => `
    <div class="note-item">
      <div style="flex:1">
        <pre>${escapeHtml(n.text)}</pre>
        <div class="note-timestamp">${n.date || ''}</div>
      </div>
      <button class="note-del" onclick="deleteNote(${n.id})" title="Delete note">✕</button>
    </div>
  `).join('');
}

// load notes on page open
renderNotes();
</script>
</body>
</html>
