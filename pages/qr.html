
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Generator | Developer OS</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div id="toast" class="toast">✓ Done!</div>

  <div class="tool-page">
    <a href="../index.html" class="back-btn">← Back to tools</a>
    <div class="tool-title">📱 QR Code Generator</div>

    <div class="card-box">
      <label>Text or URL</label>
      <input type="text" id="qr-input" placeholder="https://example.com" oninput="debounceQR()">

      <div class="qr-canvas-wrap" id="qr-wrap">
        <span class="qr-placeholder" id="qr-placeholder">Enter text above to generate a QR code</span>
        <div id="qr-output"></div>
      </div>

      <div class="row">
        <button class="btn btn-primary"   onclick="generateQR()">📱 Generate</button>
        <button class="btn btn-secondary" onclick="downloadQR()">⬇ Download PNG</button>
      </div>
    </div>
  </div>

<script>
let qrInstance = null, qrTimer = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function debounceQR() {
  clearTimeout(qrTimer);
  qrTimer = setTimeout(generateQR, 500);
}

function generateQR() {
  const text = document.getElementById('qr-input').value.trim();
  const out   = document.getElementById('qr-output');
  const ph    = document.getElementById('qr-placeholder');

  if (!text) {
    ph.style.display = '';
    out.innerHTML = '';
    qrInstance = null;
    return;
  }

  ph.style.display = 'none';
  out.innerHTML = '';
  qrInstance = new QRCode(out, {
    text,
    width: 200,
    height: 200,
    colorDark: '#1a1d27',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
}

function downloadQR() {
  const canvas = document.querySelector('#qr-output canvas');
  if (!canvas) { showToast('⚠ Generate a QR code first!'); return; }
  const a = document.createElement('a');
  a.download = 'qrcode.png';
  a.href = canvas.toDataURL();
  a.click();
  showToast('⬇ Downloading…');
}
</script>
</body>
</html>
