<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter | Developer OS</title>

<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="tool-container">

<a href="../index.html" class="back-btn">
⬅ Back
</a>

<h2>📄 JSON Formatter Pro</h2>

<textarea
id="jsonInput"
rows="10"
placeholder='Paste JSON here...'
></textarea>

<button onclick="formatJSON()">
✨ Beautify JSON
</button>

<button onclick="minifyJSON()">
📦 Minify JSON
</button>

<button onclick="validateJSON()">
✅ Validate JSON
</button>

<button onclick="copyOutput()">
📋 Copy Output
</button>

<textarea
id="jsonOutput"
rows="10"
placeholder="Result will appear here..."
readonly
></textarea>

<div
id="status"
class="result"
>
Ready...
</div>

</div>

<script>

function formatJSON(){

const input =
document.getElementById("jsonInput").value;

try{

const parsed =
JSON.parse(input);

const formatted =
JSON.stringify(
parsed,
null,
4
);

document.getElementById(
"jsonOutput"
).value = formatted;

document.getElementById(
"status"
).innerHTML =
"✅ JSON formatted successfully";

}
catch(error){

document.getElementById(
"status"
).innerHTML =
"❌ Invalid JSON";

}

}

function minifyJSON(){

const input =
document.getElementById("jsonInput").value;

try{

const parsed =
JSON.parse(input);

document.getElementById(
"jsonOutput"
).value =
JSON.stringify(parsed);

document.getElementById(
"status"
).innerHTML =
"✅ JSON minified successfully";

}
catch(error){

document.getElementById(
"status"
).innerHTML =
"❌ Invalid JSON";

}

}

function validateJSON(){

const input =
document.getElementById("jsonInput").value;

try{

JSON.parse(input);

document.getElementById(
"status"
).innerHTML =
"✅ Valid JSON";

}
catch(error){

document.getElementById(
"status"
).innerHTML =
"❌ Invalid JSON : " +
error.message;

}

}

function copyOutput(){

const output =
document.getElementById(
"jsonOutput"
);

if(output.value === ""){

alert(
"No output available"
);

return;
}

navigator.clipboard.writeText(
output.value
);

alert(
"Copied to clipboard!"
);

}

</script>

</body>
</html>
