<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Interview Timer – Developer OS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Poppins',sans-serif;background:#0d0d1a;color:#e2e8f0;min-height:100vh}
  a.back{display:inline-flex;align-items:center;gap:8px;color:#a5b4fc;text-decoration:none;font-size:.85rem;font-weight:500;margin-bottom:28px}
  a.back:hover{color:#fff}
  header{background:linear-gradient(160deg,#111128 0%,#1a1a3e 100%);text-align:center;padding:40px 20px 32px;border-bottom:1px solid rgba(99,102,241,.25)}
  header h1{font-size:2rem;font-weight:700;color:#fff}header p{font-size:.95rem;color:#94a3b8;margin-top:6px}
  .container{max-width:600px;margin:0 auto;padding:36px 24px;text-align:center}
  .presets{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:32px}
  .preset{background:transparent;border:1px solid rgba(99,102,241,.3);color:#a5b4fc;padding:8px 18px;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s}
  .preset:hover,.preset.active{background:#6366f1;border-color:#6366f1;color:#fff}
  .clock{font-size:5rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-2px;margin:20px 0;transition:color .3s}
  .clock.warning{color:#f97316}
  .clock.danger{color:#ef4444}
  .progress-ring{position:relative;width:220px;height:220px;margin:0 auto 24px}
  svg{transform:rotate(-90deg)}
  circle.track{fill:none;stroke:#1e1e2e;stroke-width:10}
  circle.progress{fill:none;stroke:#6366f1;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s linear,stroke .3s}
  .clock-inside{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
  .btn-row{display:flex;justify-content:center;gap:12px;margin-top:8px}
  .btn{display:inline-flex;align-items:center;gap:8px;background:#6366f1;color:#fff;border:none;padding:13px 28px;border-radius:10px;font-family:'Poppins',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s,transform .15s}
  .btn:hover{background:#4f46e5;transform:translateY(-1px)}
  .btn-ghost{background:transparent;border:1px solid rgba(99,102,241,.4);color:#a5b4fc}
  .btn-ghost:hover{background:rgba(99,102,241,.1)}
  .custom-row{display:flex;justify-content:center;gap:10px;margin-bottom:24px;align-items:center}
  .custom-row input{background:#111128;border:1px solid rgba(99,102,241,.3);color:#e2e8f0;font-family:'Poppins',sans-serif;font-size:.9rem;border-radius:8px;padding:10px 14px;outline:none;width:80px;text-align:center}
  .custom-row input:focus{border-color:#6366f1}
  .phase-label{font-size:.85rem;color:#64748b;margin-bottom:20px}
</style>
</head>
<body>
<header><h1>⏳ Interview Timer</h1><p>Stay on time during coding interviews</p></header>
<div class="container">
  <a class="back" href="../index.html">← Back to Developer OS</a>
  <div class="presets">
    <button class="preset active" onclick="setTimer(5,this)">5 min</button>
    <button class="preset" onclick="setTimer(10,this)">10 min</button>
    <button class="preset" onclick="setTimer(15,this)">15 min</button>
    <button class="preset" onclick="setTimer(20,this)">20 min</button>
    <button class="preset" onclick="setTimer(30,this)">30 min</button>
    <button class="preset" onclick="setTimer(45,this)">45 min</button>
    <button class="preset" onclick="setTimer(60,this)">60 min</button>
  </div>
  <div class="custom-row">
    <input type="number" id="customMin" placeholder="min" min="1" max="999">
    <button class="btn btn-ghost" style="padding:10px 16px;font-size:.85rem" onclick="setCustom()">Set Custom</button>
  </div>
  <div class="progress-ring">
    <svg width="220" height="220" viewBox="0 0 220 220">
      <circle class="track" cx="110" cy="110" r="100"/>
      <circle class="progress" id="progressCircle" cx="110" cy="110" r="100" stroke-dasharray="628.3" stroke-dashoffset="0"/>
    </svg>
    <div class="clock-inside"><div class="clock" id="clock">05:00</div></div>
  </div>
  <div class="phase-label" id="phaseLabel">Ready to start</div>
  <div class="btn-row">
    <button class="btn" id="startBtn" onclick="toggle()">▶ Start</button>
    <button class="btn btn-ghost" onclick="reset()">↺ Reset</button>
  </div>
</div>
<script>
  let total=300,remaining=300,running=false,interval=null;
  const C=Math.PI*2*100;
  function fmt(s){const m=Math.floor(s/60),sec=s%60;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
  function setTimer(min,btn){
    document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    total=min*60;reset();
  }
  function setCustom(){const m=parseInt(document.getElementById('customMin').value);if(m>0){total=m*60;reset();document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));}}
  function update(){
    const clock=document.getElementById('clock');
    clock.textContent=fmt(remaining);
    clock.className='clock'+(remaining<=30?' danger':remaining<=total*.25?' warning':'');
    const pct=remaining/total;
    document.getElementById('progressCircle').style.strokeDashoffset=C*(1-pct);
    document.getElementById('progressCircle').style.stroke=remaining<=30?'#ef4444':remaining<=total*.25?'#f97316':'#6366f1';
    document.getElementById('phaseLabel').textContent=remaining===0?'⏰ Time\'s up!':`${fmt(remaining)} remaining`;
  }
  function toggle(){
    if(remaining===0) return;
    running=!running;
    document.getElementById('startBtn').textContent=running?'⏸ Pause':'▶ Resume';
    if(running){interval=setInterval(()=>{remaining--;update();if(remaining<=0){clearInterval(interval);running=false;document.getElementById('startBtn').textContent='▶ Start';try{new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA').play();}catch(e){}}},1000);}
    else clearInterval(interval);
  }
  function reset(){clearInterval(interval);running=false;remaining=total;document.getElementById('startBtn').textContent='▶ Start';document.getElementById('phaseLabel').textContent='Ready to start';update();}
  update();
</script>
</body></html>
